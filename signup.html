<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Pak Auto</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-main) 0%, #eef2f3 100%);
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--hover-shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            text-decoration: none;
        }
        .login-logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }
        .login-logo h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--dark-color);
            letter-spacing: -0.5px;
        }
        .form-group-login {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group-login label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.95rem;
        }
        .form-group-login input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group-login input:focus {
            border-color: var(--primary-color);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <a href="index.html" class="login-logo">
                <img src="Screenshot 2026-05-03 065340.png" alt="Pak Auto Logo" onerror="this.src='logo.png'">
                <h1>Pak Auto<span class="dot" style="color: var(--primary-color);">.</span></h1>
            </a>
            <h2 style="margin-bottom: 10px; font-weight: 600; color: var(--dark-color);">Create Account</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 0.95rem;">Join us to find your dream vehicle.</p>
            
            <form id="signupForm">
                <div class="form-group-login">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group-login">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group-login">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login">Sign Up</button>
            </form>
            <p style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a id="loginLink" href="login.html" style="color: var(--primary-color); font-weight: 600;">Log in</a>
            </p>
        </div>
    </div>

    <script>
        // Pass redirect param to login link
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect');
        
        if (redirectUrl) {
            const loginLink = document.getElementById('loginLink');
            loginLink.href = 'login.html?redirect=' + encodeURIComponent(redirectUrl);
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Simulate account creation
            alert('Account created successfully! Please log in to continue.');
            
            // Navigate to login page
            if (redirectUrl) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(redirectUrl);
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
